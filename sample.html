<h2 class="sr-only">TOSS Online Helpdesk — interactive UI mock. Switch between Student, Advisor, and Admin using the
  role buttons in the header bar.</h2>
<style>
  #hda {
    display: flex;
    flex-direction: column;
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    height: 590px;
    font-family: var(--font-sans);
    font-size: 14px;
    color: var(--text-primary);
  }

  .snav {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 13px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: #9dd69d;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
  }

  .snav:hover {
    background: rgba(255, 255, 255, 0.08);
    color: #d4f5d4;
  }

  .snav.on {
    background: rgba(255, 255, 255, 0.14);
    color: #e8f8e8;
  }

  .hcard {
    background: var(--surface-2);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .trow {
    display: flex;
    align-items: center;
    padding: 11px 16px;
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
    gap: 10px;
    transition: background 0.1s;
  }

  .trow:hover {
    background: var(--surface-1);
  }

  .trow:last-child {
    border-bottom: none;
  }

  .bdg {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }

  .pbdg {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }

  .gbtn {
    background: #142e16;
    color: #d4f5d4;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .gbtn:hover {
    background: #1e4a22;
  }

  .osm {
    background: var(--surface-2);
    border: 0.5px solid var(--border-strong);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text-secondary);
  }

  .osm:hover {
    background: var(--surface-1);
  }

  .osm.on {
    background: #142e16;
    color: #d4f5d4;
    border-color: #142e16;
  }

  .flabel {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 5px;
  }

  .finp {
    background: var(--surface-1);
    border: 0.5px solid var(--border-strong);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    color: var(--text-primary);
    width: 100%;
    box-sizing: border-box;
    font-family: inherit;
    outline: none;
  }
</style>

<div id="hda">
  <div
    style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:0.5px solid var(--border);background:var(--surface-2);flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:12px;color:var(--text-muted);">Demo — view as:</span>
      <div id="rb" style="display:flex;gap:4px;"></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="position:relative;cursor:pointer;">
        <i class="ti ti-bell" style="font-size:18px;color:var(--text-secondary);" aria-label="Notifications"></i>
        <span
          style="position:absolute;top:1px;right:1px;width:6px;height:6px;background:#E24B4A;border-radius:50%;"></span>
      </span>
      <div id="av"
        style="width:30px;height:30px;border-radius:50%;background:#142e16;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#d4f5d4;">
      </div>
    </div>
  </div>
  <div style="display:flex;flex:1;overflow:hidden;">
    <nav id="sb"
      style="width:185px;flex-shrink:0;background:#142e16;display:flex;flex-direction:column;overflow-y:auto;"
      aria-label="Main navigation"></nav>
    <main id="mn" style="flex:1;overflow-y:auto;padding:18px 20px;background:var(--surface-0);"></main>
  </div>
</div>

<script>
  const T = [
    { id: 'T-001', sub: 'Missing WASSCE results — third term', cat: 'Academic', pri: 'high', st: 'open', sn: 'Kofi Mensah', sid: 'STU-001', dept: 'Academics', dt: 'Jun 28', asgn: null },
    { id: 'T-002', sub: 'School fees payment not reflecting', cat: 'Finance', pri: 'medium', st: 'in-progress', sn: 'Ama Asante', sid: 'STU-002', dept: 'Finance', dt: 'Jun 27', asgn: 'Mr. Boateng' },
    { id: 'T-003', sub: 'Recommendation letter for scholarship', cat: 'Administrative', pri: 'low', st: 'resolved', sn: 'Kwame Asare', sid: 'STU-003', dept: 'Administration', dt: 'Jun 24', asgn: 'Mrs. Amoah' },
    { id: 'T-004', sub: 'Hostel room — wrong block assigned', cat: 'Welfare', pri: 'high', st: 'open', sn: 'Abena Owusu', sid: 'STU-004', dept: 'Welfare', dt: 'Jun 29', asgn: null },
    { id: 'T-005', sub: 'Library e-card not activated', cat: 'ICT', pri: 'medium', st: 'in-progress', sn: 'Kofi Mensah', sid: 'STU-001', dept: 'ICT', dt: 'Jun 26', asgn: 'Mr. Acheampong' }
  ];
  const MSGS = {
    'T-001': [{ from: 'Kofi Mensah', r: 'student', txt: "My third-term results haven't been uploaded to the portal. Other classmates can already see theirs.", time: '9:05 AM' }],
    'T-002': [{ from: 'Ama Asante', r: 'student', txt: 'I paid GHS 1,200 at the bank on Monday but the system still shows an outstanding balance.', time: '10:30 AM' }, { from: 'Mr. Boateng', r: 'advisor', txt: 'Please share your bank receipt number so we can verify with the accounts office.', time: '11:15 AM' }],
    'T-003': [{ from: 'Kwame Asare', r: 'student', txt: 'I need a recommendation letter from the headmaster for a university scholarship.', time: '8:00 AM' }, { from: 'Mrs. Amoah', r: 'advisor', txt: 'Your letter is ready. Please collect it from the admin office with your student ID.', time: '2:00 PM' }],
    'T-004': [{ from: 'Abena Owusu', r: 'student', txt: 'I was assigned Block D but I registered for Block A, which is closer to my classes. Please review.', time: '7:45 AM' }],
    'T-005': [{ from: 'Kofi Mensah', r: 'student', txt: 'My library e-card has not been activated and I cannot access digital resources.', time: '3:00 PM' }, { from: 'Mr. Acheampong', r: 'advisor', txt: "We're processing the activation. It should be ready by tomorrow morning.", time: '4:30 PM' }]
  };
  const SSTATUS = {};
  T.forEach(t => { SSTATUS[t.id] = t.st; });
  const SMAP = { 'open': { label: 'Open', bg: '#E6F1FB', color: '#0C447C', dot: '#378ADD' }, 'in-progress': { label: 'In progress', bg: '#FAEEDA', color: '#633806', dot: '#BA7517' }, 'resolved': { label: 'Resolved', bg: '#EAF3DE', color: '#173404', dot: '#3B6D11' }, 'closed': { label: 'Closed', bg: '#F1EFE8', color: '#5F5E5A', dot: '#B4B2A9' } };
  const PMAP = { 'high': { label: 'High', bg: '#FCEBEB', color: '#A32D2D' }, 'medium': { label: 'Medium', bg: '#FAEEDA', color: '#854F0B' }, 'low': { label: 'Low', bg: '#EAF3DE', color: '#27500A' } };
  let role = 'student', view = 'dashboard', tid = null, newPri = 'medium', submitted = false;

  function sbdg(st) { const s = SMAP[st] || SMAP.open; return `<span class="bdg" style="background:${s.bg};color:${s.color};"><span style="width:6px;height:6px;border-radius:50%;background:${s.dot};flex-shrink:0;display:inline-block;"></span>${s.label}</span>`; }
  function pbdg(p) { const m = PMAP[p] || PMAP.medium; return `<span class="pbdg" style="background:${m.bg};color:${m.color};">${m.label}</span>`; }
  function scrd(val, label, ibg, icol, icon) { return `<div class="hcard" style="padding:13px 15px;"><div style="display:flex;align-items:center;gap:10px;"><div style="width:36px;height:36px;border-radius:8px;background:${ibg};display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="ti ${icon}" style="font-size:18px;color:${icol};" aria-hidden="true"></i></div><div><div style="font-size:22px;font-weight:500;">${val}</div><div style="font-size:11px;color:var(--text-muted);">${label}</div></div></div></div>`; }

  function switchRole(r) {
    role = r; tid = null; submitted = false;
    view = r === 'student' ? 'dashboard' : r === 'advisor' ? 'queue' : 'overview';
    render();
    document.querySelectorAll('#rb button').forEach(b => { b.className = b.dataset.role === r ? 'osm on' : 'osm'; });
  }
  function go(v, id) { view = v; if (id !== undefined) tid = id; render(); }
  function sendMsg() {
    const inp = document.getElementById('mi');
    if (!inp || !inp.value.trim()) return;
    const txt = inp.value.trim();
    const senderFrom = role === 'student' ? 'Kofi Mensah' : role === 'advisor' ? 'Mr. Boateng' : 'Administrator';
    MSGS[tid].push({ from: senderFrom, r: role, txt, time: 'Just now' });
    inp.value = '';
    renderMain();
    setTimeout(() => { const c = document.getElementById('cwrap'); if (c) c.scrollTop = c.scrollHeight; }, 40);
  }
  function updateStatus(s) { SSTATUS[tid] = s; renderMain(); }
  function setPri(p) { newPri = p; document.querySelectorAll('.pribtn').forEach(b => { b.className = b.dataset.pri === p ? 'osm on pribtn' : 'osm pribtn'; }); }
  function submitTicket() {
    const s = document.getElementById('ns')?.value?.trim();
    const c = document.getElementById('nc')?.value;
    const d = document.getElementById('nd')?.value?.trim();
    if (!s || !c || !d) return;
    const nid = 'T-00' + (T.length + 1);
    T.push({ id: nid, sub: s, cat: c, pri: newPri, st: 'open', sn: 'Kofi Mensah', sid: 'STU-001', dept: c, dt: 'Jun 30', asgn: null });
    MSGS[nid] = [{ from: 'Kofi Mensah', r: 'student', txt: d, time: 'Just now' }];
    SSTATUS[nid] = 'open';
    submitted = true;
    renderMain();
  }

  function renderSidebar() {
    const nav = document.getElementById('sb');
    if (!nav) return;
    const UI = { student: { name: 'Kofi Mensah', tag: 'Student', init: 'KM' }, advisor: { name: 'Mr. Boateng', tag: 'Advisor', init: 'MB' }, admin: { name: 'Administrator', tag: 'Admin', init: 'AD' } };
    const u = UI[role];
    document.getElementById('av').textContent = u.init;
    const navs = { student: [{ id: 'dashboard', label: 'Dashboard', ic: 'ti-layout-dashboard' }, { id: 'submit', label: 'New ticket', ic: 'ti-plus' }, { id: 'my-tickets', label: 'My tickets', ic: 'ti-ticket' }], advisor: [{ id: 'queue', label: 'Ticket queue', ic: 'ti-list-details' }], admin: [{ id: 'overview', label: 'Overview', ic: 'ti-layout-dashboard' }, { id: 'all-tickets', label: 'All tickets', ic: 'ti-tickets' }, { id: 'users', label: 'Users', ic: 'ti-users' }] };
    const items = navs[role] || [];
    const base = view === 'ticket-detail' ? (role === 'student' ? 'my-tickets' : role === 'advisor' ? 'queue' : 'all-tickets') : view;
    nav.innerHTML = `<div style="padding:14px 14px 10px;border-bottom:0.5px solid rgba(255,255,255,0.07);">
    <div style="font-size:10px;font-weight:500;color:#639922;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;">TOSS Helpdesk</div>
    <div style="font-size:13px;font-weight:500;color:#e8f5e8;">${u.name}</div>
    <div style="font-size:11px;color:#639922;">${u.tag}</div>
  </div>
  <div style="padding:8px 6px;flex:1;">
    ${items.map(n => `<button class="snav${base === n.id ? ' on' : ''}" onclick="go('${n.id}')"><i class="ti ${n.ic}" style="font-size:16px;" aria-hidden="true"></i>${n.label}</button>`).join('')}
  </div>
  <div style="padding:10px 14px;border-top:0.5px solid rgba(255,255,255,0.07);">
    <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#639922;"><span style="width:6px;height:6px;border-radius:50%;background:#97C459;flex-shrink:0;"></span>System online</div>
  </div>`;
  }

  function renderMain() {
    const mn = document.getElementById('mn');
    if (!mn) return;

    if (view === 'ticket-detail' && tid) {
      const t = T.find(x => x.id === tid);
      const msgs = MSGS[tid] || [];
      const st = SSTATUS[tid] || t.st;
      const bv = role === 'student' ? 'my-tickets' : role === 'advisor' ? 'queue' : 'all-tickets';
      const canCtrl = role === 'advisor' || role === 'admin';
      mn.innerHTML = `<button class="osm" onclick="go('${bv}')" style="margin-bottom:14px;display:inline-flex;align-items:center;gap:5px;"><i class="ti ti-arrow-left" style="font-size:13px;" aria-hidden="true"></i>Back</button>
    <div class="hcard">
      <div style="padding:14px 16px;border-bottom:0.5px solid var(--border);">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
          <div style="min-width:0;">
            <div style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono);margin-bottom:4px;">${t.id}</div>
            <div style="font-size:15px;font-weight:500;margin-bottom:4px;">${t.sub}</div>
            <div style="font-size:12px;color:var(--text-secondary);">${t.sn} &middot; ${t.cat} &middot; ${t.dt}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;">${sbdg(st)}${pbdg(t.pri)}</div>
        </div>
        ${canCtrl ? `<div style="display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;">${['open', 'in-progress', 'resolved', 'closed'].map(s => `<button class="osm${st === s ? ' on' : ''}" onclick="updateStatus('${s}')">${s === 'in-progress' ? 'In progress' : s.charAt(0).toUpperCase() + s.slice(1)}</button>`).join('')}</div>` : ''}
      </div>
      <div id="cwrap" style="padding:14px 16px;background:var(--surface-0);min-height:130px;display:flex;flex-direction:column;gap:10px;max-height:200px;overflow-y:auto;">
        ${msgs.map(msg => { const isR = (role === 'student' && msg.r === 'student') || (role !== 'student' && msg.r !== 'student'); return `<div style="display:flex;${isR ? 'justify-content:flex-end' : 'justify-content:flex-start'};"><div style="max-width:74%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.5;${msg.r === 'student' ? 'background:var(--surface-2);border:0.5px solid var(--border);color:var(--text-primary);' : 'background:#142e16;color:#d4f5d4;'}"><div style="font-size:11px;font-weight:500;margin-bottom:3px;${msg.r === 'student' ? 'color:var(--text-muted);' : 'color:#639922;'}">${msg.from}</div>${msg.txt}<div style="font-size:11px;margin-top:4px;text-align:right;${msg.r === 'student' ? 'color:var(--text-muted);' : 'color:#639922;'}">${msg.time}</div></div></div>`; }).join('')}
      </div>
      <div style="padding:10px 16px;border-top:0.5px solid var(--border);display:flex;gap:8px;">
        <input id="mi" type="text" class="finp" placeholder="Type a reply…" style="flex:1;" onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="gbtn" onclick="sendMsg()" style="padding:8px 12px;"><i class="ti ti-send" aria-hidden="true"></i></button>
      </div>
    </div>`;
      setTimeout(() => { const c = document.getElementById('cwrap'); if (c) c.scrollTop = c.scrollHeight; }, 40);
      return;
    }

    if (role === 'student') {
      if (view === 'dashboard') {
        const mine = T.filter(x => x.sid === 'STU-001');
        mn.innerHTML = `<div style="font-size:16px;font-weight:500;margin-bottom:3px;">Welcome back, Kofi</div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">Here's where your support requests stand.</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;">
        ${scrd(mine.length, 'Total tickets', '#E6F1FB', '#185FA5', 'ti-ticket')}
        ${scrd(mine.filter(x => SSTATUS[x.id] === 'in-progress').length, 'In progress', '#FAEEDA', '#BA7517', 'ti-clock')}
        ${scrd(mine.filter(x => SSTATUS[x.id] === 'resolved').length, 'Resolved', '#EAF3DE', '#3B6D11', 'ti-circle-check')}
      </div>
      <div class="hcard">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--border);">
          <span style="font-size:13px;font-weight:500;">Recent tickets</span>
          <button class="gbtn" onclick="go('submit')" style="padding:6px 11px;font-size:12px;"><i class="ti ti-plus" style="font-size:13px;" aria-hidden="true"></i>New ticket</button>
        </div>
        ${mine.map(t => `<div class="trow" onclick="go('ticket-detail','${t.id}')"><i class="ti ti-file-description" style="font-size:16px;color:var(--text-muted);flex-shrink:0;" aria-hidden="true"></i><div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.sub}</div><div style="font-size:11px;color:var(--text-muted);">${t.id} &middot; ${t.cat} &middot; ${t.dt}</div></div><div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">${pbdg(t.pri)}${sbdg(SSTATUS[t.id] || t.st)}<i class="ti ti-chevron-right" style="font-size:14px;color:var(--text-muted);" aria-hidden="true"></i></div></div>`).join('')}
      </div>`;
      }
      else if (view === 'submit') {
        if (submitted) {
          mn.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;">
          <div style="width:54px;height:54px;border-radius:50%;background:#EAF3DE;display:flex;align-items:center;justify-content:center;margin-bottom:14px;"><i class="ti ti-check" style="font-size:26px;color:#3B6D11;" aria-label="Success"></i></div>
          <div style="font-size:16px;font-weight:500;margin-bottom:6px;">Ticket submitted</div>
          <div style="font-size:13px;color:var(--text-muted);max-width:280px;line-height:1.6;">You'll receive a notification when a staff member responds. Track it under My tickets.</div>
          <button class="gbtn" onclick="submitted=false;go('dashboard')" style="margin-top:18px;">Back to dashboard</button>
        </div>`; return;
        }
        mn.innerHTML = `<div style="max-width:460px;">
        <div style="font-size:16px;font-weight:500;margin-bottom:3px;">Submit a support ticket</div>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">Describe your issue clearly and a staff member will follow up.</div>
        <div class="hcard" style="padding:16px;">
          <div style="margin-bottom:12px;"><label class="flabel">Category</label>
            <select id="nc" class="finp">${['', 'Academic', 'Finance', 'Administrative', 'Welfare', 'ICT', 'Other'].map((c, i) => `<option value="${c}">${i === 0 ? 'Select a category' : c}</option>`).join('')}</select>
          </div>
          <div style="margin-bottom:12px;"><label class="flabel">Subject</label><input id="ns" type="text" class="finp" placeholder="Brief description of the issue"></div>
          <div style="margin-bottom:12px;"><label class="flabel">Description</label><textarea id="nd" class="finp" rows="3" style="resize:none;" placeholder="Provide as much detail as possible…"></textarea></div>
          <div style="margin-bottom:16px;"><label class="flabel">Priority</label>
            <div style="display:flex;gap:6px;">${['low', 'medium', 'high'].map(p => `<button data-pri="${p}" class="osm pribtn${newPri === p ? ' on' : ''}" onclick="setPri('${p}')" style="flex:1;text-align:center;">${p.charAt(0).toUpperCase() + p.slice(1)}</button>`).join('')}</div>
          </div>
          <button class="gbtn" onclick="submitTicket()" style="width:100%;justify-content:center;">Submit ticket</button>
        </div>
      </div>`;
      }
      else if (view === 'my-tickets') {
        const mine = T.filter(x => x.sid === 'STU-001');
        mn.innerHTML = `<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;">
        <div><div style="font-size:16px;font-weight:500;">My tickets</div><div style="font-size:12px;color:var(--text-muted);">All your support requests in one place.</div></div>
        <button class="gbtn" onclick="go('submit')" style="font-size:12px;padding:7px 12px;"><i class="ti ti-plus" style="font-size:13px;" aria-hidden="true"></i>New ticket</button>
      </div>
      <div class="hcard">${mine.map(t => `<div class="trow" onclick="go('ticket-detail','${t.id}')"><i class="ti ti-file-description" style="font-size:16px;color:var(--text-muted);flex-shrink:0;" aria-hidden="true"></i><div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.sub}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${t.id} &middot; ${t.cat} &middot; ${t.dt}${t.asgn ? ` &middot; ${t.asgn}` : ''}</div></div><div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">${pbdg(t.pri)}${sbdg(SSTATUS[t.id] || t.st)}<i class="ti ti-chevron-right" style="font-size:14px;color:var(--text-muted);" aria-hidden="true"></i></div></div>`).join('')}</div>`;
      }
    }

    else if (role === 'advisor') {
      if (view === 'queue') {
        mn.innerHTML = `<div style="font-size:16px;font-weight:500;margin-bottom:3px;">Ticket queue</div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">Review and manage incoming student requests.</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;">
        ${scrd(T.filter(x => !x.asgn).length, 'Unassigned', '#FCEBEB', '#A32D2D', 'ti-alert-triangle')}
        ${scrd(T.filter(x => SSTATUS[x.id] === 'in-progress').length, 'In progress', '#FAEEDA', '#BA7517', 'ti-clock')}
        ${scrd(T.filter(x => SSTATUS[x.id] === 'resolved').length, 'Resolved today', '#EAF3DE', '#3B6D11', 'ti-circle-check')}
      </div>
      <div class="hcard">${T.map(t => `<div class="trow" onclick="go('ticket-detail','${t.id}')">
        <span style="width:8px;height:8px;border-radius:50%;background:${SMAP[SSTATUS[t.id]]?.dot || '#B4B2A9'};flex-shrink:0;"></span>
        <div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.sub}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${t.sn} &middot; ${t.dept} &middot; ${t.dt}</div><div style="font-size:11px;margin-top:1px;">${t.asgn ? `<span style="color:var(--text-muted);">Assigned: ${t.asgn}</span>` : `<span style="color:#A32D2D;font-weight:500;">Unassigned</span>`}</div></div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">${pbdg(t.pri)}${sbdg(SSTATUS[t.id] || t.st)}<i class="ti ti-chevron-right" style="font-size:14px;color:var(--text-muted);" aria-hidden="true"></i></div>
      </div>`).join('')}</div>`;
      }
    }

    else if (role === 'admin') {
      if (view === 'overview') {
        const total = T.length;
        const cats = [{ cat: 'Academic', n: 2, col: '#3C3489', bg: '#EEEDFE' }, { cat: 'Finance', n: 1, col: '#0C447C', bg: '#E6F1FB' }, { cat: 'Welfare', n: 1, col: '#72243E', bg: '#FBEAF0' }, { cat: 'ICT', n: 1, col: '#27500A', bg: '#EAF3DE' }];
        mn.innerHTML = `<div style="font-size:16px;font-weight:500;margin-bottom:3px;">Overview</div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">Platform-wide activity and support summary.</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;">
        <div class="hcard" style="padding:12px 14px;"><div style="font-size:21px;font-weight:500;">${total}</div><div style="font-size:11px;color:var(--text-muted);">Total tickets</div></div>
        <div class="hcard" style="padding:12px 14px;"><div style="font-size:21px;font-weight:500;">${T.filter(x => SSTATUS[x.id] === 'open').length}</div><div style="font-size:11px;color:var(--text-muted);">Open</div></div>
        <div class="hcard" style="padding:12px 14px;"><div style="font-size:21px;font-weight:500;">${T.filter(x => SSTATUS[x.id] === 'in-progress').length}</div><div style="font-size:11px;color:var(--text-muted);">In progress</div></div>
        <div class="hcard" style="padding:12px 14px;"><div style="font-size:21px;font-weight:500;">${T.filter(x => SSTATUS[x.id] === 'resolved').length}</div><div style="font-size:11px;color:var(--text-muted);">Resolved</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div class="hcard" style="padding:15px 16px;">
          <div style="font-size:13px;font-weight:500;margin-bottom:12px;">Tickets by category</div>
          ${cats.map(c => `<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="color:var(--text-secondary);">${c.cat}</span><span style="font-weight:500;">${c.n}</span></div><div style="height:6px;background:var(--surface-1);border-radius:999px;"><div style="height:6px;border-radius:999px;background:${c.col};width:${Math.round((c.n / total) * 100)}%;"></div></div></div>`).join('')}
        </div>
        <div class="hcard" style="padding:15px 16px;">
          <div style="font-size:13px;font-weight:500;margin-bottom:10px;">Recent activity</div>
          ${T.slice(0, 4).map(t => `<div onclick="go('ticket-detail','${t.id}')" style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border);cursor:pointer;">
            <span style="width:6px;height:6px;border-radius:50%;background:${SMAP[SSTATUS[t.id]]?.dot || '#B4B2A9'};flex-shrink:0;"></span>
            <div style="flex:1;min-width:0;"><div style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.sub}</div><div style="font-size:11px;color:var(--text-muted);">${t.sn} &middot; ${t.dt}</div></div>
            ${sbdg(SSTATUS[t.id] || t.st)}
          </div>`).join('')}
          <div onclick="go('all-tickets')" style="margin-top:8px;font-size:12px;color:var(--text-accent);cursor:pointer;">View all tickets →</div>
        </div>
      </div>`;
      }
      else if (view === 'all-tickets') {
        mn.innerHTML = `<div style="font-size:16px;font-weight:500;margin-bottom:3px;">All tickets</div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">Complete record of every support request.</div>
      <div class="hcard">
        <div style="padding:10px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;">
          <i class="ti ti-search" style="font-size:15px;color:var(--text-muted);" aria-hidden="true"></i>
          <input type="text" placeholder="Search tickets…" style="border:none;background:transparent;font-size:13px;color:var(--text-primary);outline:none;flex:1;font-family:inherit;">
        </div>
        ${T.map(t => `<div class="trow" onclick="go('ticket-detail','${t.id}')">
          <span style="width:8px;height:8px;border-radius:50%;background:${SMAP[SSTATUS[t.id]]?.dot || '#B4B2A9'};flex-shrink:0;"></span>
          <div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.sub}</div><div style="font-size:11px;color:var(--text-muted);">${t.sn} &middot; ${t.id} &middot; ${t.dept} &middot; ${t.dt}</div></div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">${pbdg(t.pri)}${sbdg(SSTATUS[t.id] || t.st)}<i class="ti ti-chevron-right" style="font-size:14px;color:var(--text-muted);" aria-hidden="true"></i></div>
        </div>`).join('')}
      </div>`;
      }
      else if (view === 'users') {
        const users = [{ name: 'Kofi Mensah', tag: 'Student', dept: 'ICT Dept.', id: 'STU-001', init: 'KM' }, { name: 'Ama Asante', tag: 'Student', dept: 'Science Dept.', id: 'STU-002', init: 'AA' }, { name: 'Kwame Asare', tag: 'Student', dept: 'Arts Dept.', id: 'STU-003', init: 'KA' }, { name: 'Mr. Boateng', tag: 'Advisor', dept: 'Finance Office', id: 'ADV-001', init: 'MB' }, { name: 'Mrs. Amoah', tag: 'Advisor', dept: 'Admin Office', id: 'ADV-002', init: 'MA' }, { name: 'Mr. Acheampong', tag: 'Advisor', dept: 'ICT Lab', id: 'ADV-003', init: 'RA' }];
        mn.innerHTML = `<div style="font-size:16px;font-weight:500;margin-bottom:3px;">Users</div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">Manage student and advisor accounts.</div>
      <div class="hcard">${users.map(u => `<div class="trow" style="cursor:default;">
        <div style="width:32px;height:32px;border-radius:50%;background:#142e16;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#d4f5d4;flex-shrink:0;">${u.init}</div>
        <div style="flex:1;"><div style="font-size:13px;font-weight:500;">${u.name}</div><div style="font-size:11px;color:var(--text-muted);">${u.id} &middot; ${u.dept}</div></div>
        <span class="pbdg" style="${u.tag === 'Student' ? 'background:#E6F1FB;color:#0C447C;' : 'background:#EAF3DE;color:#27500A;'}">${u.tag}</span>
      </div>`).join('')}</div>`;
      }
    }
  }

  function render() { renderSidebar(); renderMain(); }
  document.getElementById('rb').innerHTML = ['student', 'advisor', 'admin'].map(r => `<button data-role="${r}" class="osm${r === role ? ' on' : ''}" onclick="switchRole('${r}')">${r.charAt(0).toUpperCase() + r.slice(1)}</button>`).join('');
  render();
</script>
